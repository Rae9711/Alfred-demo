# Docker Compose v2 (no version needed)

services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - LLM_PROVIDER=${LLM_PROVIDER:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:1.5b}
      - GOOGLE_ACCESS_TOKEN=${GOOGLE_ACCESS_TOKEN:-}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - KIWI_API_KEY=${KIWI_API_KEY:-}
      - WECOM_CORP_ID=${WECOM_CORP_ID:-}
      - WECOM_CORP_SECRET=${WECOM_CORP_SECRET:-}
      - WECOM_KF_ID=${WECOM_KF_ID:-}
      - WECOM_CALLBACK_TOKEN=${WECOM_CALLBACK_TOKEN:-}
      - WECOM_CALLBACK_AES_KEY=${WECOM_CALLBACK_AES_KEY:-}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ./server/src/outbox:/app/src/outbox
      - backend_data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Note: Models are pulled on first use, or you can pull manually:
    # docker-compose exec ollama ollama pull qwen2.5:1.5b

  # Frontend is now served by backend in production
  # Uncomment if you want separate frontend container
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: web/Dockerfile
  #     args:
  #       - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8080}
  #   ports:
  #     - "${FRONTEND_PORT:-80}:80"
  #   depends_on:
  #     - backend
  #   restart: unless-stopped

volumes:
  ollama_data:
  backend_data:
